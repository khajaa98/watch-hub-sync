##
## .github/workflows/ci.yml
##
## Watch Hub Sync — Continuous Integration Pipeline.
##
## Triggers:
##   - Pull Requests to `main`            (full gate — must pass to merge)
##   - Pushes to `main`                   (post-merge verification)
##   - Manual dispatch (`workflow_dispatch`) for emergency re-runs
##
## Pipeline stages (sequential within each job, jobs may run in parallel):
##
##   1. quality   → install → typecheck → lint
##   2. billing   → install → vitest (meter-calculator pure unit tests)
##   3. build     → install → next build (env validation gate)
##
## The `build` job is the final gate. It runs `next build` with stub env vars
## (SKIP_ENV_VALIDATION=1 is NOT set — real validation runs against stubs that
## satisfy the schema format but contain no real secrets). This verifies:
##   a) All imports resolve
##   b) All TypeScript is compilable under `next build` (even with --noEmit skipped)
##   c) The Next.js page/route graph is valid
##
## Secrets required in GitHub → Settings → Secrets and Variables → Actions:
##   (None) — the build uses format-valid stub values, not real credentials.
##   Real secrets only live in Vercel Environment Variables.
##

name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip the next build step (use for hotfix PRs)"
        type: boolean
        default: false
        required: false

concurrency:
  # Cancel in-progress runs for the same PR to save CI minutes.
  # For pushes to main, do not cancel (allow concurrent post-merge runs).
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Node.js version pinned to match Vercel's runtime.
  NODE_VERSION: "20"
  # pnpm version pinned to prevent lockfile drift.
  PNPM_VERSION: "9"
  # Disable Next.js telemetry in CI.
  NEXT_TELEMETRY_DISABLED: "1"
  # Suppress Turbopack experimental warning.
  TURBOPACK: "0"

##
## ── JOB 1: Code Quality ────────────────────────────────────────────────────
##
## TypeScript type checking and ESLint linting.
## These run BEFORE unit tests so developers get type errors first.
##
jobs:
  quality:
    name: "Type Check & Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        # --frozen-lockfile ensures CI uses exactly the versions in pnpm-lock.yaml.
        # Any drift between package.json and lockfile causes a hard failure here.

      - name: TypeScript — strict type check
        run: pnpm tsc --noEmit --pretty
        # --noEmit: type-check only, do not emit JS files
        # --pretty: coloured output with file names and line numbers in GH Actions
        env:
          # tsc needs these to resolve NEXT_PUBLIC_ types but doesn't use values
          SKIP_ENV_VALIDATION: "1"

      - name: ESLint — lint all TypeScript files
        run: pnpm eslint . --ext .ts,.tsx --max-warnings 0
        # --max-warnings 0: treat warnings as errors in CI.
        # Developers can use --fix locally; CI must be clean.
        env:
          SKIP_ENV_VALIDATION: "1"

##
## ── JOB 2: Billing Integrity Tests ─────────────────────────────────────────
##
## Pure unit tests for meter-calculator.ts. These MUST pass on every commit.
## Billing calculation errors are financial bugs — zero tolerance.
##
  billing-tests:
    name: "Billing Unit Tests (meter-calculator)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Run in parallel with quality check — billing tests don't depend on linting

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run billing unit tests
        run: pnpm vitest run src/lib/billing/__tests__/meter-calculator.test.ts --reporter=verbose
        # --reporter=verbose: show each test case individually in GH Actions output.
        # Full test output is retained in the Actions log for billing audit trail.
        env:
          NODE_ENV: test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always() # Upload even on failure for debugging
        with:
          name: billing-test-results-${{ github.sha }}
          path: coverage/
          retention-days: 30
          if-no-files-found: ignore

##
## ── JOB 3: Next.js Build Gate ───────────────────────────────────────────────
##
## Runs `next build` with format-valid stub env vars to:
##   1. Validate the env.ts schema (Zod validates format, not real secrets)
##   2. Verify the page/route graph compiles without errors
##   3. Catch broken imports and missing modules before deploy
##
## This job only runs after both quality and billing-tests pass.
##
  build:
    name: "Next.js Build Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - quality
      - billing-tests
    if: ${{ !inputs.skip_build }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.mjs') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Next.js build
        run: pnpm next build
        env:
          NODE_ENV: production

          # ── Format-valid stub env vars for Zod schema validation ──────────
          # These satisfy the regex/format constraints in env.ts WITHOUT
          # containing any real credentials. The build validates format only.
          # Vercel injects real secrets at deploy time.

          # Supabase
          NEXT_PUBLIC_SUPABASE_URL: "https://abcdefghijklmnop.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDAwMDAwMDB9.AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
          SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTcwMDAwMDAwMH0.BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB"
          SUPABASE_JWT_SECRET: "ci-stub-jwt-secret-minimum-32-characters-long-for-validation"
          DATABASE_URL: "postgresql://postgres.ci-stub:ci-stub-password@aws-0-ap-south-1.pooler.supabase.com:6543/postgres"
          DATABASE_URL_DIRECT: "postgresql://postgres:ci-stub-password@db.ci-stub.supabase.com:5432/postgres"

          # LiveKit
          LIVEKIT_URL: "wss://ci-stub.livekit.cloud"
          LIVEKIT_API_KEY: "APIci-stub-key"
          LIVEKIT_API_SECRET: "ci-stub-livekit-secret-minimum-32-characters"

          # Stripe
          STRIPE_SECRET_KEY: "sk_test_CIstubkeyforformatvalidation1234567890"
          STRIPE_WEBHOOK_SECRET: "whsec_cistub1234567890abcdefghijklmnopqrstuvwx"
          STRIPE_PRICE_ID_PREMIUM: "price_CIstub1234567890"
          STRIPE_METER_ID_PARTICIPANT_MINUTES: "participant_minutes"

          # Razorpay
          RAZORPAY_KEY_ID: "rzp_test_CIstub1234567890"
          RAZORPAY_KEY_SECRET: "ci-stub-razorpay-key-secret-16ch"
          RAZORPAY_WEBHOOK_SECRET: "ci-stub-razorpay-webhook-secret"
          RAZORPAY_PLAN_ID_PREMIUM: "plan_CIstub1234567890"

          # Svix
          SVIX_WEBHOOK_SECRET: "whsec_cistubsvix1234567890abcdefghijklmnopqrs"

          # Iron Session
          IRON_SESSION_SECRET: "ci-stub-iron-session-secret-minimum-32-chars-1234"

          # App URL
          NEXT_PUBLIC_APP_URL: "https://watchhubsync.com"

          # Observability (optional — no stubs needed)
          # AXIOM_TOKEN and AXIOM_DATASET are optional in env.ts schema

      - name: Check build output size
        run: |
          echo "=== Next.js Build Output Summary ==="
          du -sh .next/ 2>/dev/null || echo "Build directory not found"
          if [ -f .next/build-manifest.json ]; then
            echo "Build manifest present ✓"
          fi

##
## ── JOB 4: Security Audit ───────────────────────────────────────────────────
##
## Runs pnpm audit to catch known CVEs in dependencies.
## Non-blocking on PRs (reports as a comment) but blocking on main merges.
##
  security-audit:
    name: "Dependency Security Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Run in parallel — doesn't block other jobs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit for high/critical CVEs
        run: pnpm audit --audit-level=high
        # Fails on HIGH or CRITICAL severity CVEs.
        # MODERATE and LOW are reported but do not fail the build.
        # Update dependencies immediately when this gate fails.
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        # On PRs: non-blocking (shows warning). On main merges: blocking.
